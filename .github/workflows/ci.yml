name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Fail if README-pypi.md is out of sync
        shell: bash
        run: |
          python scripts/prepare_pypi_readme.py
          if ! git diff --exit-code README-pypi.md; then
            echo ""
            echo "ERROR: README-pypi.md is out of sync with README.md."
            echo "Run locally and commit the result:"
            echo "  python scripts/prepare_pypi_readme.py"
            echo "  git add README-pypi.md"
            exit 1
          fi
      - run: pip install -e ".[dev]"
      - run: python scripts/update_badges.py --check
      - run: pytest --cov=synthadoc --cov-report=term-missing -v

  coverage-badge:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/prepare_pypi_readme.py
      - run: pip install -e ".[dev]"
      - run: pytest --cov=synthadoc --cov-report=json -q
      - run: python scripts/update_badges.py --coverage-json coverage.json
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/badges.json
          git diff --staged --quiet || git commit -m "ci: update coverage badge"
          git push origin HEAD:badges --force

  build-plugin-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd obsidian-plugin && npm install && npm run build && npm test
      - run: python scripts/sync_plugin.py
      - name: Fail if compiled plugin files are not committed
        shell: bash
        run: |
          if ! git diff --exit-code synthadoc/data/obsidian-plugin/; then
            echo ""
            echo "ERROR: compiled Obsidian plugin files are out of sync."
            echo "Run these locally and commit the result before opening a PR:"
            echo "  cd obsidian-plugin && npm run build"
            echo "  python scripts/sync_plugin.py"
            echo "  git add synthadoc/data/obsidian-plugin/"
            exit 1
          fi
      - run: cd web-ui && npm install && npm run build
      - run: python scripts/sync_web_ui.py
      - name: Fail if compiled web UI files are not committed
        shell: bash
        run: |
          if ! git diff --exit-code synthadoc/data/web-ui/; then
            echo ""
            echo "ERROR: compiled web UI files are out of sync."
            echo "Run these locally and commit the result before opening a PR:"
            echo "  cd web-ui && npm run build"
            echo "  python scripts/sync_web_ui.py"
            echo "  git add synthadoc/data/web-ui/"
            exit 1
          fi
